apiVersion: cache.azure.upbound.io/v1beta1
kind: ManagedRedisAccessPolicyAssignment
metadata:
  annotations:
    meta.upbound.io/example-id: cache/v1beta1/managedredisaccesspolicyassignment
    uptest.upbound.io/timeout: "3600"
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    managedRedisIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    objectId: ${data.azurerm_client_config.current.object_id}

---

apiVersion: cache.azure.upbound.io/v1beta1
kind: ManagedRedis
metadata:
  annotations:
    meta.upbound.io/example-id: cache/v1beta1/managedredisaccesspolicyassignment
  labels:
    testing.upbound.io/example-name: example
  name: mr-${Rand.RFC1123Subdomain}
spec:
  forProvider:
    defaultDatabase:
      geoReplicationGroupName: myGeoGroup
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    skuName: Balanced_B3

---

apiVersion: azure.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: cache/v1beta1/managedredisaccesspolicyassignment
  labels:
    testing.upbound.io/example-name: example
  name: example-mrapa-${Rand.RFC1123Subdomain}
spec:
  forProvider:
    location: West Europe
