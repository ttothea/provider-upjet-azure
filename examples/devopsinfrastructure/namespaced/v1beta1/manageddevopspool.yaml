apiVersion: devopsinfrastructure.azure.m.upbound.io/v1beta1
kind: ManagedDevopsPool
metadata:
  annotations:
    meta.upbound.io/example-id: devopsinfrastructure/v1beta1/manageddevopspool
    upjet.upbound.io/manual-intervention: "Replace 'https://dev.azure.com/example' with a real Azure DevOps organization URL where the authenticated principal is a Project Collection Admin."
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    azureDevopsOrganization:
      organization:
      - parallelism: 1
        url: https://dev.azure.com/example
    devCenterProjectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    location: West Europe
    maximumConcurrency: 1
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    statelessAgent: {}
    virtualMachineScaleSetFabric:
      image:
      - wellKnownImageName: ubuntu-24.04
      skuName: Standard_D2ads_v5

---

apiVersion: devcenter.azure.m.upbound.io/v1beta1
kind: Center
metadata:
  annotations:
    meta.upbound.io/example-id: devopsinfrastructure/v1beta1/manageddevopspool
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: devcenter.azure.m.upbound.io/v1beta1
kind: Project
metadata:
  annotations:
    meta.upbound.io/example-id: devopsinfrastructure/v1beta1/manageddevopspool
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    devCenterIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: azure.m.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: devopsinfrastructure/v1beta1/manageddevopspool
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe
