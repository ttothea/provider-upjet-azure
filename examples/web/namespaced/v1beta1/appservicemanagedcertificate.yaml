apiVersion: web.azure.m.upbound.io/v1beta1
kind: AppServiceManagedCertificate
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1ns
  name: appsvcmngcertv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    customHostnameBindingIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1ns

---

apiVersion: web.azure.m.upbound.io/v1beta1
kind: AppServiceCertificateBinding
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1ns
  name: appsvcmngcertv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    certificateIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1ns
    hostnameBindingIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1ns
    sslState: SniEnabled

---

apiVersion: web.azure.m.upbound.io/v1beta1
kind: AppServiceCustomHostNameBinding
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
    crossplane.io/external-name: appsvcmngcertv1beta1ns.azuree2e.upbound.io
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1ns
  name: appsvcmngcertv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    appServiceName: appsvcmngcertv1beta1ns
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1ns

---

apiVersion: web.azure.m.upbound.io/v1beta1
kind: LinuxWebApp
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
    uptest.upbound.io/timeout: "2700"
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1ns
  name: appsvcmngcertv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    authSettings:
      enabled: false
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1ns
    servicePlanIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1ns
    siteConfig: {}

---

apiVersion: web.azure.m.upbound.io/v1beta1
kind: ServicePlan
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
    uptest.upbound.io/pre-delete-hook: ../testhooks/delete-linux-app.sh
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1ns
  name: appsvcmngcertv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe
    osType: Linux
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1ns
    skuName: B1

---

apiVersion: network.azure.m.upbound.io/v1beta1
kind: DNSCNAMERecord
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1ns
  name: appsvcmngcertv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    record: appsvcmngcertv1beta1ns.azurewebsites.net
    resourceGroupName: ${data.azurerm_dns_zone.public.resource_group_name}
    ttl: 300
    zoneName: ${data.azurerm_dns_zone.public.name}

---

apiVersion: azure.m.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1ns
  name: appsvcmngcertv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe
