apiVersion: web.azure.upbound.io/v1beta1
kind: AppServiceManagedCertificate
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1
  name: appsvcmngcertv1beta1
spec:
  forProvider:
    customHostnameBindingIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1

---

apiVersion: web.azure.upbound.io/v1beta1
kind: AppServiceCertificateBinding
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1
  name: appsvcmngcertv1beta1
spec:
  forProvider:
    certificateIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1
    hostnameBindingIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1
    sslState: SniEnabled

---

apiVersion: web.azure.upbound.io/v1beta1
kind: AppServiceCustomHostNameBinding
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
    crossplane.io/external-name: appsvcmngcertv1beta1.azuree2e.upbound.io
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1
  name: appsvcmngcertv1beta1
spec:
  forProvider:
    appServiceName: appsvcmngcertv1beta1
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1

---

apiVersion: web.azure.upbound.io/v1beta2
kind: LinuxWebApp
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1
  name: appsvcmngcertv1beta1
spec:
  forProvider:
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1
    servicePlanIdSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1
    siteConfig: {}

---

apiVersion: web.azure.upbound.io/v1beta1
kind: ServicePlan
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
    uptest.upbound.io/pre-delete-hook: ../testhooks/delete-linux-app.sh
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1
  name: appsvcmngcertv1beta1
spec:
  forProvider:
    location: West Europe
    osType: Linux
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: appsvcmngcertv1beta1
    skuName: B1

---

apiVersion: network.azure.upbound.io/v1beta1
kind: DNSCNAMERecord
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1
  name: appsvcmngcertv1beta1
spec:
  forProvider:
    record: appsvcmngcertv1beta1.azurewebsites.net
    resourceGroupName: e2e-public-dns
    ttl: 300
    zoneName: azuree2e.upbound.io

---

apiVersion: azure.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: web/v1beta1/appservicemanagedcertificate
  labels:
    testing.upbound.io/example-name: appsvcmngcertv1beta1
  name: appsvcmngcertv1beta1
spec:
  forProvider:
    location: West Europe
