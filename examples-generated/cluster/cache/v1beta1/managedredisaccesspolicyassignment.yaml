apiVersion: cache.azure.upbound.io/v1beta1
kind: ManagedRedisAccessPolicyAssignment
metadata:
  annotations:
    meta.upbound.io/example-id: cache/v1beta1/managedredisaccesspolicyassignment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    managedRedisIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    objectId: ${data.azuread_client_config.current.object_id}

---

apiVersion: cache.azure.upbound.io/v1beta1
kind: ManagedRedis
metadata:
  annotations:
    meta.upbound.io/example-id: cache/v1beta1/managedredisaccesspolicyassignment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    defaultDatabase:
      accessKeysAuthenticationEnabled: true
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    skuName: Balanced_B0

---

apiVersion: azure.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: cache/v1beta1/managedredisaccesspolicyassignment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    location: West Europe
