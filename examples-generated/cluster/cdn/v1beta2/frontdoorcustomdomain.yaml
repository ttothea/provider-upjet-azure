apiVersion: cdn.azure.upbound.io/v1beta2
kind: FrontdoorCustomDomain
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cdnFrontdoorProfileIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    dnsZoneIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    hostNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    tls:
      certificateType: ManagedCertificate
      minimumVersion: TLS12

---

apiVersion: cdn.azure.upbound.io/v1beta1
kind: FrontdoorEndpoint
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cdnFrontdoorProfileIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: cdn.azure.upbound.io/v1beta1
kind: FrontdoorFirewallPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    mode: Prevention
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    skuNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: cdn.azure.upbound.io/v1beta2
kind: FrontdoorOrigin
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cdnFrontdoorOriginGroupIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    certificateNameCheckEnabled: false
    hostNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: cdn.azure.upbound.io/v1beta2
kind: FrontdoorOriginGroup
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cdnFrontdoorProfileIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    loadBalancing: {}

---

apiVersion: cdn.azure.upbound.io/v1beta1
kind: FrontdoorProfile
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    skuName: Standard_AzureFrontDoor

---

apiVersion: cdn.azure.upbound.io/v1beta2
kind: FrontdoorRoute
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cdnFrontdoorCustomDomainIdsRefs:
    - name: example
    cdnFrontdoorEndpointIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    cdnFrontdoorOriginGroupIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    cdnFrontdoorOriginIdsRefs:
    - name: example
    patternsToMatch:
    - /*
    supportedProtocols:
    - Http
    - Https

---

apiVersion: cdn.azure.upbound.io/v1beta2
kind: FrontdoorSecurityPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cdnFrontdoorProfileIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    securityPolicies:
      firewall:
        association:
          domain:
          - cdnFrontdoorDomainIdSelector:
              matchLabels:
                testing.upbound.io/example-name: example
          patternsToMatch:
          - /*
        cdnFrontdoorFirewallPolicyIdSelector:
          matchLabels:
            testing.upbound.io/example-name: example

---

apiVersion: network.azure.upbound.io/v1beta2
kind: DNSZone
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: azure.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: cdn/v1beta2/frontdoorcustomdomain
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    location: West Europe
